<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLM-5 Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', sans-serif;
      background: #343541;
      color: #ececf1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #202123;
      padding: 12px 20px;
      border-bottom: 1px solid #444654;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
      background: #10a37f;
      color: white;
    }

    .status.offline {
      background: #ef4444;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      display: flex;
      gap: 16px;
      padding: 20px;
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      background: #343541;
    }

    .message.assistant {
      background: #444654;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: #5436da;
    }

    .message.assistant .avatar {
      background: #10a37f;
    }

    .message-content {
      flex: 1;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 8px 0;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ececf1;
      animation: typing 1.4s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.7; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    .input-container {
      padding: 20px;
      background: #343541;
      border-top: 1px solid #444654;
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      background: #40414f;
      border-radius: 12px;
      border: 1px solid #565869;
      display: flex;
      align-items: flex-end;
      padding: 12px;
      gap: 12px;
    }

    .input-wrapper:focus-within {
      border-color: #ececf1;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: #ececf1;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 200px;
      line-height: 1.5;
    }

    textarea::placeholder {
      color: #8e8ea0;
    }

    .send-button {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: none;
      background: #19c37d;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-button:hover:not(:disabled) {
      background: #1a7f5a;
    }

    .send-button:disabled {
      background: #40414f;
      cursor: not-allowed;
      opacity: 0.5;
    }

    .voice-button {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 2px solid transparent;
      background: #40414f;
      color: #ececf1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .voice-button:hover:not(:disabled) {
      background: #565869;
    }

    .voice-button.listening {
      border-color: #ef4444;
      background: #40414f;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { 
        box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
      }
      50% { 
        box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.1);
      }
    }

    .voice-button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .voice-button.transcribing {
      opacity: 0.6;
      cursor: wait;
    }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: #8e8ea0;
    }

    .welcome h2 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #ececf1;
    }

    .welcome p {
      font-size: 16px;
      margin-bottom: 30px;
    }

    .examples {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .example-card {
      background: #444654;
      padding: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
      text-align: left;
    }

    .example-card:hover {
      background: #565869;
    }

    .example-card h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #ececf1;
    }

    .example-card p {
      font-size: 13px;
      color: #c5c5d2;
    }

    .error {
      background: #ef4444;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 10px 0;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #343541;
    }

    ::-webkit-scrollbar-thumb {
      background: #565869;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #6e6e80;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>
      <span>🤖</span>
      GLM-5 Chat
    </h1>
    <div class="status" id="status">Checking...</div>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome">
      <h2>Welcome to GLM-5</h2>
      <p>Start a conversation or try one of these examples:</p>
      <div class="examples">
        <div class="example-card" onclick="sendExample('Explain quantum computing in simple terms')">
          <h3>💡 Explain</h3>
          <p>Quantum computing in simple terms</p>
        </div>
        <div class="example-card" onclick="sendExample('Write a Python function to sort a list')">
          <h3>💻 Code</h3>
          <p>Python function to sort a list</p>
        </div>
        <div class="example-card" onclick="sendExample('What are the benefits of meditation?')">
          <h3>🧘 Wellness</h3>
          <p>Benefits of meditation</p>
        </div>
      </div>
    </div>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <button class="voice-button" id="voiceButton" onclick="toggleVoiceRecording()" title="Voice input">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 1C10.34 1 9 2.34 9 4V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V4C15 2.34 13.66 1 12 1Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 10V12C19 15.866 15.866 19 12 19C8.134 19 5 15.866 5 12V10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M12 19V23" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 23H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <textarea 
        id="messageInput" 
        placeholder="Send a message..." 
        rows="1"
        onkeydown="handleKeyPress(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-button" id="sendButton" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M7 11L12 6L17 11M12 18V7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const API_KEY = "86f90fe16ae34556b84f61f69bfc772c.bDA0Er5ScuCqbpEq";
    const API_ENDPOINT = "https://api.z.ai/api/coding/paas/v4/chat/completions";
    const TRANSCRIPTION_ENDPOINT = "https://api.z.ai/api/paas/v4/audio/transcriptions";
    
    let messages = [];
    let isProcessing = false;
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;
    let isTranscribing = false;
    let microphonePermission = null;

    // Check API availability
    async function checkAPI() {
      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: "glm-4.7",
            messages: [{ role: "user", content: "test" }],
            max_tokens: 5
          })
        });

        const status = document.getElementById('status');
        if (response.ok) {
          status.textContent = 'Online';
          status.classList.remove('offline');
        } else {
          status.textContent = 'Offline';
          status.classList.add('offline');
        }
      } catch (error) {
        const status = document.getElementById('status');
        status.textContent = 'Offline';
        status.classList.add('offline');
      }
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function sendExample(text) {
      document.getElementById('messageInput').value = text;
      sendMessage();
    }

    function addMessage(role, content) {
      const container = document.getElementById('chatContainer');
      const welcome = container.querySelector('.welcome');
      if (welcome) welcome.remove();

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      messageDiv.innerHTML = `
        <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="message-content">${content}</div>
      `;
      container.appendChild(messageDiv);
      container.scrollTop = container.scrollHeight;
      return messageDiv;
    }

    function showTyping() {
      const container = document.getElementById('chatContainer');
      const typingDiv = document.createElement('div');
      typingDiv.className = 'message assistant';
      typingDiv.id = 'typing';
      typingDiv.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="message-content">
          <div class="typing">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      `;
      container.appendChild(typingDiv);
      container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      if (isProcessing || isTranscribing) return;

      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message) return;

      isProcessing = true;
      document.getElementById('sendButton').disabled = true;
      document.getElementById('voiceButton').disabled = true;
      
      // Add user message
      addMessage('user', message);
      messages.push({ role: "user", content: message });
      
      input.value = '';
      input.style.height = 'auto';
      
      showTyping();

      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: "glm-4.7",
            messages: messages,
            stream: false,
            temperature: 0.75,
            max_tokens: 2048
          })
        });

        removeTyping();

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error?.message || 'API request failed');
        }

        const data = await response.json();
        const assistantMessage = data.choices[0].message.content;
        
        addMessage('assistant', assistantMessage);
        messages.push({ role: "assistant", content: assistantMessage });

      } catch (error) {
        removeTyping();
        addMessage('assistant', `❌ Error: ${error.message}`);
      } finally {
        isProcessing = false;
        document.getElementById('sendButton').disabled = false;
        document.getElementById('voiceButton').disabled = false;
        input.focus();
      }
    }

    // Voice Recording with GLM ASR API
    async function checkMicrophonePermission() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(track => track.stop());
        microphonePermission = 'granted';
        return true;
      } catch (error) {
        if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
          microphonePermission = 'denied';
          alert('Microphone access denied. Please allow microphone access in your browser settings to use voice input.');
        } else {
          console.error('Microphone error:', error);
          alert('Unable to access microphone. Please check your device settings.');
        }
        return false;
      }
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        mediaRecorder = new MediaRecorder(stream, {
          mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg'
        });
        
        audioChunks = [];
        
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };
        
        mediaRecorder.onstop = async () => {
          stream.getTracks().forEach(track => track.stop());
          await transcribeAudio();
        };
        
        mediaRecorder.start();
        isRecording = true;
        
        const voiceButton = document.getElementById('voiceButton');
        voiceButton.classList.add('listening');
        voiceButton.title = 'Click to stop recording';
        
      } catch (error) {
        console.error('Failed to start recording:', error);
        alert('Failed to start recording. Please check your microphone.');
      }
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        isRecording = false;
        
        const voiceButton = document.getElementById('voiceButton');
        voiceButton.classList.remove('listening');
        voiceButton.classList.add('transcribing');
        voiceButton.title = 'Transcribing...';
      }
    }

    async function transcribeAudio() {
      if (audioChunks.length === 0) {
        resetVoiceButton();
        return;
      }

      isTranscribing = true;
      document.getElementById('sendButton').disabled = true;
      document.getElementById('messageInput').disabled = true;

      try {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        
        const formData = new FormData();
        formData.append('model', 'glm-asr-2512');
        formData.append('file', audioBlob, 'recording.webm');

        const response = await fetch(TRANSCRIPTION_ENDPOINT, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_KEY}`
          },
          body: formData
        });

        if (!response.ok) {
          throw new Error('Transcription failed');
        }

        const data = await response.json();
        
        if (data.text) {
          const input = document.getElementById('messageInput');
          input.value = data.text;
          autoResize(input);
          input.focus();
        } else {
          alert('No speech detected. Please try again.');
        }

      } catch (error) {
        console.error('Transcription error:', error);
        alert('Failed to transcribe audio. Please try again.');
      } finally {
        isTranscribing = false;
        document.getElementById('sendButton').disabled = false;
        document.getElementById('messageInput').disabled = false;
        resetVoiceButton();
      }
    }

    function resetVoiceButton() {
      const voiceButton = document.getElementById('voiceButton');
      voiceButton.classList.remove('listening', 'transcribing');
      voiceButton.title = 'Voice input';
    }

    async function toggleVoiceRecording() {
      if (isTranscribing || isProcessing) {
        return;
      }

      if (isRecording) {
        stopRecording();
      } else {
        if (microphonePermission === null) {
          const hasPermission = await checkMicrophonePermission();
          if (!hasPermission) {
            return;
          }
        } else if (microphonePermission === 'denied') {
          alert('Microphone access was previously denied. Please enable it in your browser settings.');
          return;
        }
        
        await startRecording();
      }
    }

    // Initialize
    checkAPI();
    document.getElementById('messageInput').focus();
  </script>
</body>
</html>
