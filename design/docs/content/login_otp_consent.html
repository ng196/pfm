<button class="text-xs font-bold uppercase tracking-widest text-primary hover:opacity-80 transition-opacity">Resend Code</button>

<span class="material-symbols-outlined absolute text-white text-[16px] left-0.5 pointer-events-none opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
</div>
<div class="flex-grow">
<span class="block text-sm font-bold text-on-surface mb-1 uppercase tracking-tight">AA Consent</span>
<p class="text-xs text-on-surface-variant leading-relaxed">

                            </p>
